name: 🔬 SERP Blog Research (Automated)

on:
  schedule:
    # Her gün 3 kez çalışır: 06:00, 14:00, 22:00 UTC
    - cron: '0 6 * * *'
    - cron: '0 14 * * *'
    - cron: '0 22 * * *'
  workflow_dispatch: # Manuel tetikleme butonu

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔬 Run SERP Research (Single Batch)
        run: node scripts/research-serp.mjs
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: 📊 Show Progress
        run: |
          echo "=== Intelligence State ==="
          cat data/intelligence_state.json
          echo ""
          echo "=== Total Intelligence Files ==="
          ls data/intelligence/*.json 2>/dev/null | wc -l || echo "0"

      - name: 📤 Commit & Push New Intelligence Data
        run: |
          git config user.name "SERP Research Bot"
          git config user.email "bot@yetkilikombiservisi.tr"
          git add data/intelligence/ data/intelligence_state.json
          if git diff --staged --quiet; then
            echo "No new data to commit."
          else
            git commit -m "🔬 Auto: SERP Research batch $(date +%Y-%m-%d_%H:%M)"
            git push
          fi
