name: SERP Content Enrichment Otopilot

on:
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Research Script
        run: node scripts/research-serp.mjs
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Commit and Push changes
        run: |
          git config user.name "SERP Assistant"
          git config user.email "serp-assistant@antigravity.ai"
          git add data/intelligence/ data/intelligence_state.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: autonomous serp enrichment batch [skip ci]"
            git push
          fi
